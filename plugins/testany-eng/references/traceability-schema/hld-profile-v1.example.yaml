  decisions:
    - id: DEC-CHECKOUT-001
      title: 优惠券校验使用营销服务 gRPC 接口
      statement: 结算页优惠券校验选择调用营销服务内部 gRPC 接口，而非新建 HTTP 网关。
      status: proposed
      scope: in
      decision: 使用营销服务内部 gRPC 接口
      rationale: 营销服务已有成熟的优惠券校验能力，gRPC 延迟低于 HTTP 网关，且团队已有 gRPC 基础设施。
      source_refs:
        - artifact_id: PRD-CHECKOUT-001
          section: "3.1"
          note: REQ-CHECKOUT-001 要求的优惠券校验能力
    - id: DEC-CHECKOUT-002
      title: 折扣金额由服务端计算并签名
      statement: 折扣金额必须由服务端计算并签名，前端不参与金额计算。
      status: proposed
      scope: in
      decision: 服务端计算折扣并签名
      rationale: 防止前端篡改折扣金额，确保展示金额与入单金额一致。
      source_refs:
        - artifact_id: PRD-CHECKOUT-001
          section: "3.1"
          note: REQ-CHECKOUT-002 安全约束
  flows:
    - id: FLOW-CHECKOUT-001
      title: 优惠券应用主流程
      statement: 用户在结算页输入优惠券码，系统调用营销服务校验后展示折后金额，提交订单时使用签名金额入单。
      status: proposed
      scope: in
      kind: system_flow
      source_refs:
        - artifact_id: PRD-CHECKOUT-001
          section: "3.1"
          note: 结算流程中优惠券子流程
